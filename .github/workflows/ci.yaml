name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  telegram-bot:
    name: Telegram Bot (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram_bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: telegram_bot/package-lock.json
      - run: npm ci
      - run: npm run prettier -- --check .
      - run: npm run typescript

  viz-frontend:
    name: Viz Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: viz/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  viz-backend:
    name: Viz Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz/backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: viz/backend
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo build

  whoop-collector:
    name: WHOOP Collector (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector/whoop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Syntax check
        run: python -m py_compile whoop_import.py oauth_helper.py

  docker-compose-validate:
    name: Validate docker-compose.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up stub env files for validation
        run: |
          cp telegram_bot/.env.example telegram_bot/.env
          cp viz/backend/sample.env viz/backend/.env
      - run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: ci_placeholder
