services:
  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - /etc/cloudflare/metrics.soumyadeep.in:/etc/cloudflare/metrics.soumyadeep.in
    depends_on:
      - viz
    profiles:
      - with_nginx
  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=soumyadeepmukherjee
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soumyadeepmukherjee"]
      interval: 10s
      timeout: 5s
      retries: 5
  worker:
    image: dementor/matrix-telegram:latest
    command: npm run worker
    restart: always
    env_file:
    - telegram_bot/.env
    depends_on:
      - db
  scheduler:
    image: dementor/matrix-telegram:latest
    command: npm run scheduler
    restart: always
    env_file:
      - telegram_bot/.env
    depends_on:
      - db
  viz:
    image: dementor/matrix-viz:latest
    restart: always
    env_file:
      - viz/backend/.env
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  pg_data:
